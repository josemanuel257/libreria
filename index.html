<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>libreria</title>
    <link rel="stylesheet" href=".//css/style.css">
</head>
<body>
    <header>
        <h1>libreria jojojojose</h1>
        <p>Bienvenido a nuestra libreria en este espacio podras agregar un libro nuevo</p>
    </header>
    <nav></nav>
    <main>
        <section>
            <br>
            <h2>Agregar un libro</h2>
            <br>
            <form action="javascript:void(0);" method="post" id="formulario">
                <label for="Titulo">Titulo</label>
                <input type="text" id="Titulo" name="Titulo" placeholder="Escribe el titulo del libro">
                <span id="errorTitulo" class="error"></span>
                <br><br>
                
                <label for="Autor">Autor</label>
                <input type="text" id="Autor" name="Autor" placeholder="Escribe el autor del libro">
                <span id="errorAutor" class="error"></span>
                <br><br>

                <label for="Año">Año</label>
                <input type="number" id="Año" name="Año" min="1000" max="2026" placeholder="Escribe el año del libro">
                <span id="errorAño" class="error"></span>
                <br><br>

                <label for="Genero">Genero</label>
                <select name="Genero" id="Genero">
                    <option value="">Selecciona una opción</option>
                    <option value="Ficcion">Ficción</option>
                    <option value="Romance">Romance</option>
                    <option value="CienciaFiccion">Ciencia Ficción</option>
                    <option value="biografia">Biografía</option>
                    <option value="terror">Terror</option>
                    <option value="fantasia">Fantasía</option>
                    <option value="comedia">Comedia</option>
                    <option value="novela">Novela</option>
                </select>
                <span id="errorGenero" class="error"></span>
                <br><br>
                <span id="mensaje" class="mensaje"></span> 

                <button class="btn-apply" type="submit">Agregar libro</button>
                
            </form>
        </section>
        <br>
        <hr>
        <br>

        <div id="busquedaTitulo">
                <h2>Buscar libros por título</h2>
                <input type="text" id="busqueda" placeholder="Buscar por título">
                <button id="btnBuscar">Buscar</button>
            </div>

            <div id="busquedaGenero">
                <h2>Buscar libros por género</h2>
                <select id="filtroGenero">
                    <option value="">Selecciona un género</option>
                    <option value="Ficcion">Ficción</option>
                    <option value="Romance">Romance</option>
                    <option value="CienciaFiccion">Ciencia Ficción</option>
                    <option value="biografia">Biografía</option>
                    <option value="terror">Terror</option>
                    <option value="fantasia">Fantasía</option>
                    <option value="comedia">Comedia</option>
                    <option value="novela">Novela</option>
                </select>
                <button id="btnFiltrar">Filtrar</button>
            </div>

            <ul id="listaLibros"></ul>


            <table id="tablaLibros">
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Autor</th>
                        <th>Año</th>
                        <th>Género</th>
                    </tr>
                </thead>
                <tbody id="cuerpotabla">
                </tbody>
            </table>
        </div>
    </main>
    <br><br>
    <footer>
        <p>Derechos reservados &copy; 2026</p>
    </footer>
    <script src="js/fuctions.js"></script>


</body>
</html>
