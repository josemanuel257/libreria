<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>libreria</title>
</head>
<body>
    <header>-=
        <h1>libreria jojojojose</h1>
        <p>Bienvenido a nuestra libreria en este espacio podras agregar un libro nuevo</p>
    </header>
    <nav></nav>
    <main>
        <section>
            <h2>Agregar un libro</h2>
            <form action="#" method="post">
                <label for="Titulo">Titulo</label>
                <input type="text" id="Titulo" name="Titulo" placeholder="Escribe el titulo del libro" required>
                <br><br>
                <label for="Autor">Autor</label>
                <input type="text" id="Autor" name="Autor" placeholder="Escribe el autor del libro" required>
                <br><br>
                <label for="Año">Año</label>
                <input type="number" id="Año" name="Año" min="1000" max="2026" placeholder="Escribe el año del libro" required>
                <br><br>

                <label for="Genero">Genero</label>
                <select name="Genero" id="Genero" required>
                    <option value="Ficcion">Ficción</option>
                    <option value="Romance">Romance</option>
                    <option value="CienciaFiccion">Ciencia Ficción</option>
                    <option value="biografia">Biografía</option>
                    <option value="terror">Terror</option>
                    <option value="fantasia">Fantasía</option>
                    <option value="comedia">Comedia</option>
                    <option value="novela">Novela</option>
                </select>
                <br><br>
                <button type="submit">Agregar libro</button>
            </form>
        </section>
    </main>
    <footer></footer>

</body>
</html>
